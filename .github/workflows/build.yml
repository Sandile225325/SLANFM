name: SLANFM build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.5'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow

      - name: Build SLANFM-client-windows
        shell: cmd
        run: |
          pyinstaller --onefile --noconsole ^
            --icon=client/icon.ico ^
            --add-data "client/config.json;." ^
            --add-data "client/icon.png;." ^
            --add-data "client/icon.ico;." ^
            --name "SLANFM-client-windows" ^
            client/gui.py

      - name: Build SLANFM-server-windows
        shell: cmd
        run: |
          pyinstaller --onefile --console ^
            --icon=server/icon.ico ^
            --add-data "server/server_config.json;." ^
            --name "SLANFM-server-windows" ^
            server/server.py

      - name: Create client package
        shell: cmd
        run: |
          mkdir client-package
          copy dist\SLANFM-client-windows.exe client-package\
          copy client\icon.png client-package\
          copy client\icon.ico client-package\
          copy client\config.json client-package\
          
          echo @echo off > client-package\start_client.bat
          echo echo Creating SLANFM configuration directory... >> client-package\start_client.bat
          echo if not exist "%%APPDATA%%\SLANFM" mkdir "%%APPDATA%%\SLANFM" >> client-package\start_client.bat
          echo if not exist "%%APPDATA%%\SLANFM\config.json" ( >> client-package\start_client.bat
          echo     echo Copying default configuration... >> client-package\start_client.bat
          echo     copy "%%~dp0config.json" "%%APPDATA%%\SLANFM\config.json" >> client-package\start_client.bat
          echo ) >> client-package\start_client.bat
          echo echo Starting SLANFM Client... >> client-package\start_client.bat
          echo start "" "%%~dp0SLANFM-client-windows.exe" >> client-package\start_client.bat
          
          powershell -Command "Compress-Archive -Path client-package/* -DestinationPath dist/SLANFM-client-windows.zip -Force"

      - name: Create server package
        shell: cmd
        run: |
          mkdir server-package
          copy dist\SLANFM-server-windows.exe server-package\
          copy server\server_config.json server-package\
          
          echo @echo off > server-package\start_server.bat
          echo echo Starting SLANFM Server... >> server-package\start_server.bat
          echo start "" "%%~dp0SLANFM-server-windows.exe" >> server-package\start_server.bat
          
          powershell -Command "Compress-Archive -Path server-package/* -DestinationPath dist/SLANFM-server-windows.zip -Force"

      - name: List dist directory
        run: dir dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SLANFM-client-windows.zip
            dist/SLANFM-server-windows.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
