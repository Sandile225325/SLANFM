name: SLANFM build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.5'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow

      - name: Build SLANFM-client-windows
        shell: cmd
        run: |
          pyinstaller --onefile --noconsole ^
            --icon=client/icon.ico ^
            --add-data "client/config.json;." ^
            --add-data "client/icon.png;." ^
            --add-data "client/icon.ico;." ^
            --name "SLANFM-client-windows" ^
            client/gui.py

      - name: Build SLANFM-server-windows
        shell: cmd
        run: |
          pyinstaller --onefile --console ^
            --icon=server/icon.ico ^
            --add-data "server/server_config.json;." ^
            --name "SLANFM-server-windows" ^
            server/server.py

      - name: Create client package
        shell: powershell
        run: |
          Write-Host "Creating client package"
          $packageDir = "client-package"
          if (Test-Path $packageDir) { Remove-Item -Recurse -Force $packageDir }
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Write-Host "Copying files to $packageDir"
          Copy-Item "dist\SLANFM-client-windows.exe" "$packageDir\" -ErrorAction Stop
          Copy-Item "client\icon.png" "$packageDir\" -ErrorAction Stop
          Copy-Item "client\icon.ico" "$packageDir\" -ErrorAction Stop
          Copy-Item "client\config.json" "$packageDir\" -ErrorAction Stop

          Write-Host "Creating start_client.bat"
          $batContent = @'
          @echo off
          echo Creating SLANFM configuration directory...
          if not exist "%APPDATA%\SLANFM" mkdir "%APPDATA%\SLANFM"
          if not exist "%APPDATA%\SLANFM\config.json" (
              echo Copying default configuration...
              copy "%~dp0config.json" "%APPDATA%\SLANFM\config.json"
          )
          echo Starting SLANFM Client...
          start "" "%~dp0SLANFM-client-windows.exe"
          '@
          $batFile = Join-Path $packageDir "start_client.bat"
          $batContent | Out-File -FilePath $batFile -Encoding ASCII -Force

          Write-Host "Creating zip"
          Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\SLANFM-client-windows.zip" -Force

      - name: Create server package
        shell: powershell
        run: |
          Write-Host "Creating server package"
          $packageDir = "server-package"
          if (Test-Path $packageDir) { Remove-Item -Recurse -Force $packageDir }
          New-Item -ItemType Directory -Path $packageDir -Force | Out-Null

          Write-Host "Copying files to $packageDir"
          Copy-Item "dist\SLANFM-server-windows.exe" "$packageDir\" -ErrorAction Stop
          Copy-Item "server\server_config.json" "$packageDir\" -ErrorAction Stop

          Write-Host "Creating start_server.bat"
          $batContent = @'
          @echo off
          echo Starting SLANFM Server...
          start "" "%~dp0SLANFM-server-windows.exe"
          '@
          $batFile = Join-Path $packageDir "start_server.bat"
          $batContent | Out-File -FilePath $batFile -Encoding ASCII -Force

          Write-Host "Creating zip"
          Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\SLANFM-server-windows.zip" -Force

      - name: List dist directory
        run: dir dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SLANFM-client-windows.zip
            dist/SLANFM-server-windows.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
