name: SLANFM build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.5'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow

      - name: Build SLANFM-client-windows
        shell: cmd
        run: |
          pyinstaller --onefile --noconsole ^
            --icon=client/icon.ico ^
            --add-data "client/config.json;." ^
            --add-data "client/icon.png;." ^
            --add-data "client/icon.ico;." ^
            --name "SLANFM-client-windows" ^
            client/gui.py

      - name: Build SLANFM-server-windows
        shell: cmd
        run: |
          pyinstaller --onefile --console ^
            --icon=server/icon.ico ^
            --add-data "server/server_config.json;." ^
            --name "SLANFM-server-windows" ^
            server/server.py

      - name: List dist directory
        run: dir dist

      - name: Prepare client package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "client-package" -Force
          Copy-Item "dist/SLANFM-client-windows.exe" "client-package/"
          Copy-Item "client/icon.png" "client-package/"
          Copy-Item "client/icon.ico" "client-package/"
          Copy-Item "client/config.json" "client-package/"
          Compress-Archive -Path "client-package/*" -DestinationPath "dist/SLANFM-client-windows.zip" -Force

      - name: Prepare server package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "server-package" -Force
          Copy-Item "dist/SLANFM-server-windows.exe" "server-package/"
          Copy-Item "server/server_config.json" "server-package/"
          Compress-Archive -Path "server-package/*" -DestinationPath "dist/SLANFM-server-windows.zip" -Force

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SLANFM-client-windows.zip
            dist/SLANFM-server-windows.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
