name: SLANFM build and release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.5
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.5'

      - name: Install dependencies
        run: |
          pip install pyinstaller Pillow

      - name: Build SLANFM-client-windows
        shell: cmd
        run: |
          pyinstaller --onefile --noconsole ^
            --icon=client/icon.ico ^
            --add-data "client/config.json;." ^
            --add-data "client/icon.png;." ^
            --add-data "client/icon.ico;." ^
            --name "SLANFM-client-windows" ^
            client/gui.py

      - name: Build SLANFM-server-windows
        shell: cmd
        run: |
          pyinstaller --onefile --console ^
            --icon=server/icon.ico ^
            --add-data "server/server_config.json;." ^
            --name "SLANFM-server-windows" ^
            server/server.py

      - name: Create client package
        shell: powershell
        run: |
          if (Test-Path client-package) { Remove-Item -Recurse -Force client-package }
          New-Item -ItemType Directory -Path client-package | Out-Null

          Copy-Item dist\SLANFM-client-windows.exe client-package\
          Copy-Item client\icon.png client-package\
          Copy-Item client\icon.ico client-package\
          Copy-Item client\config.json client-package\

          $batContent = @'
          @echo off
          echo Creating SLANFM configuration directory...
          if not exist "%APPDATA%\SLANFM" mkdir "%APPDATA%\SLANFM"
          if not exist "%APPDATA%\SLANFM\config.json" (
              echo Copying default configuration...
              copy "%~dp0config.json" "%APPDATA%\SLANFM\config.json"
          )
          echo Starting SLANFM Client...
          start "" "%~dp0SLANFM-client-windows.exe"
          '@
          $batContent | Out-File -FilePath client-package\start_client.bat -Encoding ASCII

          Compress-Archive -Path client-package\* -DestinationPath dist\SLANFM-client-windows.zip -Force

      - name: Create server package
        shell: powershell
        run: |
          if (Test-Path server-package) { Remove-Item -Recurse -Force server-package }
          New-Item -ItemType Directory -Path server-package | Out-Null

          Copy-Item dist\SLANFM-server-windows.exe server-package\
          Copy-Item server\server_config.json server-package\

          $batContent = @'
          @echo off
          echo Starting SLANFM Server...
          start "" "%~dp0SLANFM-server-windows.exe"
          '@
          $batContent | Out-File -FilePath server-package\start_server.bat -Encoding ASCII

          Compress-Archive -Path server-package\* -DestinationPath dist\SLANFM-server-windows.zip -Force

      - name: List dist directory
        run: dir dist

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SLANFM-client-windows.zip
            dist/SLANFM-server-windows.zip
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
